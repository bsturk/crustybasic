name: Update Subfolder Screenshots README

on:
  push:
    paths:
      - 'screenshots/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update screenshots/README.md
        run: |
          python -c '
          import os, re

          img_dir = "screenshots"
          readme_path = os.path.join(img_dir, "README.md")

          if not os.path.exists(img_dir) or not os.path.exists(readme_path):
              print("Screenshots directory or sub-README not found.")
              exit()

          valid_extensions = (".png", ".jpg", ".jpeg", ".gif", ".webp")
          images = sorted([
              f for f in os.listdir(img_dir) 
              if f.lower().endswith(valid_extensions) and f.lower() != "readme.md"
          ])
          
          columns = 4
          html_content = "<table>\n"
          
          for i in range(0, len(images), columns):
              html_content += "  <tr>\n"
              row_images = images[i:i+columns]
              for img in row_images:
                  html_content += (
                      f"    <td align=\"center\" valign=\"top\">\n"
                      f"      <img src=\"{img}\" width=\"350\" alt=\"{img}\"><br>\n"
                      f"      <sub><b>{img}</b></sub>\n"
                      f"    </td>\n"
                  )
              # if the last row is not full, add empty cells to keep the table valid
              if len(row_images) < columns:
                  for _ in range(columns - len(row_images)):
                      html_content += "    <td></td>\n"
              html_content += "  </tr>\n"
              
          html_content += "</table>\n"

          with open(readme_path, "r") as f:
              readme = f.read()

          pattern = r"(<!-- SCREENSHOTS_START -->)(.*?)(<!-- SCREENSHOTS_END -->)"
          replacement = f"\\1\n{html_content}\\3"
          new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open(readme_path, "w") as f:
              f.write(new_readme)
          '

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: auto-update screenshots/README.md" || exit 0
          git push
